<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Family Activity Scout{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav">
    <div class="nav-brand">🎯 Family Scout</div>
    <div class="nav-links">
        <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/calendar" class="{% if page == 'calendar' %}active{% endif %}">Kalender</a>
        <a href="/preferences" class="{% if page == 'preferences' %}active{% endif %}">Profil</a>
    </div>
</nav>
<main class="container">
    {% block content %}{% endblock %}
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
